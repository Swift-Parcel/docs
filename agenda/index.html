<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2026 IT Digital Internship – Training Calendar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=IBM&#43;Plex&#43;Mono:wght@400;500&amp;family=Space&#43;Grotesk:wght@300;400;500;600;700&amp;display=swap"
    rel="stylesheet">



  <style>
    :root {
      --bg: #0a0b0e;
      --surface: #111318;
      --surface2: #181b22;
      --surface3: #1f232e;
      --border: rgba(255, 255, 255, 0.06);
      --border2: rgba(255, 255, 255, 0.12);
      --text: #dde1f0;
      --text2: #8b90a8;
      --text3: #555a70;
      --accent: #4f8ef7;
      --accent-dim: rgba(79, 142, 247, 0.12);

       
      --c-inperson: #f5c542;
      --c-instructor: #f87171;
      --c-wbt: #5ab4f5;
      --c-project: #fb923c;
      --c-other: #a0a8c0;

      --header-h: 52px;
      --bar-h: 44px;
      --legend-h: 36px;
      --sticky-h: 132px;
      --lane-h: 42px;
      --label-w: 160px;
    }


    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Space Grotesk', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      font-size: 13px;
      -webkit-font-smoothing: antialiased;
    }

    .sticky-shell {
      position: sticky;
      top: 0;
      z-index: 300;
      background: var(--bg);
      border-bottom: 1px solid var(--border2);
    }

    .header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 0 20px;
      height: var(--header-h);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .logo-badge {
      width: 28px;
      height: 28px;
      background: linear-gradient(135deg, #4f8ef7 0%, #a855f7 100%);
      border-radius: 7px;
      display: grid;
      place-items: center;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      font-weight: 500;
      color: #fff;
      letter-spacing: -0.5px;
    }

    .logo-text {
      font-size: 13px;
      font-weight: 600;
      color: var(--text2);
      letter-spacing: 0.2px;
    }

    .header-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.3px;
    }

    .ev.conflict {
      outline: 2px solid rgba(248, 113, 113, 0.6);
      box-shadow: 0 0 0 2px rgba(248, 113, 113, 0.15);
    }

    .ev.split-preview {
      opacity: 0.72;
      outline: 1px dashed rgba(255, 255, 255, 0.45);
      pointer-events: none;
    }

    .ev.split-preview .ev-title::after {
      content: " preview";
      font-size: 8px;
      opacity: 0.65;
      margin-left: 4px;
    }

    .ev.dragging {
      pointer-events: none;
    }

    body.drag-active .day-row {
      display: flex !important;
    }

    body.drag-active .week-block {
      display: block !important;
    }

    body.drag-active .day-empty .timeline {
      height: var(--lane-h) !important;
      opacity: 0.55;
    }

    .header-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .stat-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
    }

    .stat-num {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      font-weight: 500;
      color: var(--accent);
    }

    .stat-lbl {
      font-size: 11px;
      color: var(--text3);
    }

    .save-status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: var(--text3);
      transition: color 0.3s;
    }

    .save-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--text3);
      transition: background 0.3s;
    }

    .save-status.saving .save-dot {
      background: #f5c542;
    }

    .save-status.saving {
      color: #f5c542;
    }

    .save-status.saved .save-dot {
      background: #4de8a0;
    }

    .save-status.saved {
      color: #4de8a0;
    }

    .save-status.error .save-dot {
      background: #f87171;
    }

    .save-status.error {
      color: #f87171;
    }

    .filter-bar {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 0 20px;
      height: var(--bar-h);
      overflow-x: auto;
      scrollbar-width: none;
      border-top: 1px solid var(--border);
    }

    .filter-bar::-webkit-scrollbar {
      display: none;
    }

    .bar-label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 9px;
      letter-spacing: 1.5px;
      color: var(--text3);
      text-transform: uppercase;
      margin-right: 4px;
      white-space: nowrap;
    }

    .legend-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 20px;
      height: var(--legend-h);
      border-top: 1px solid var(--border);
      overflow-x: auto;
      scrollbar-width: none;
    }

    .legend-bar::-webkit-scrollbar {
      display: none;
    }

    .leg {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      color: var(--text3);
      white-space: nowrap;
    }

    .leg-dot {
      width: 8px;
      height: 8px;
      border-radius: 2px;
      flex-shrink: 0;
    }

    .ruler-wrap {
      position: sticky;
      top: var(--sticky-h);
      z-index: 200;
      background: var(--bg);
      display: flex;
      border-bottom: 1px solid var(--border);
      padding: 5px 0 4px;
    }

    .ruler-pad {
      width: var(--label-w);
      flex-shrink: 0;
    }

    .ruler-ticks {
      position: relative;
      flex: 1;
      height: 18px;
    }

    .rtick {
      position: absolute;
      transform: translateX(-50%);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 9px;
      color: var(--text3);
      letter-spacing: 0.3px;
      top: 0;
    }

    .calendar {
      padding: 0 20px 80px;
    }

    .week-block {
      margin-top: 32px;
    }

    .week-header {
      display: flex;
      align-items: baseline;
      gap: 0;
      padding: 10px 0 10px var(--label-w);
      border-bottom: 1px solid var(--border2);
      margin-bottom: 2px;
      position: relative;
    }

    .week-num {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 9px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text3);
      position: absolute;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
    }

    .week-prog {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      font-weight: 500;
      color: var(--accent);
      margin-right: 12px;
    }

    .week-range {
      font-size: 11px;
      color: var(--text3);
      font-weight: 300;
    }

    .week-tally {
      margin-left: auto;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      color: var(--text3);
    }

    .day-row {
      display: flex;
      min-height: var(--lane-h);
      margin-top: 3px;
    }

    .day-label {
      width: var(--label-w);
      flex-shrink: 0;
      padding: 8px 16px 8px 0;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
    }

    .day-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.2;
    }

    .day-date {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      color: var(--text3);
      margin-top: 2px;
    }

    .timeline {
      position: relative;
      flex: 1;
      border-left: 1px solid var(--border);
      border-top: 1px solid transparent;
    }

    .timeline::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: repeating-linear-gradient(to right, var(--border) 0px, var(--border) 1px, transparent 1px, transparent calc(100% / 9));
      pointer-events: none;
      z-index: 0;
    }

     
    .ev {
      position: absolute;
      border-radius: 5px;
      padding: 4px 7px;
      font-size: 11px;
      overflow: hidden;
      cursor: pointer;
      height: calc(var(--lane-h) - 5px);
      top: 3px;
      z-index: 1;
      border: 1px solid rgba(0, 0, 0, 0.15);
      transition: box-shadow 0.12s, opacity 0.12s, transform 0.1s;
      touch-action: none;
    }

    .ev:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.4);
      z-index: 10;
    }

    .ev.dragging {
      opacity: 0.85;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
      z-index: 500;
      cursor: grabbing;
      transform: none;
    }

    .ev.split-continue {
      border-left: 3px dashed rgba(0, 0, 0, 0.3);
    }

    .ev.split-start {
      border-right: 3px dashed rgba(0, 0, 0, 0.3);
    }

    .ev-inner {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      height: 100%;
      pointer-events: none;
    }

    .ev-top {
      display: flex;
      align-items: center;
      gap: 4px;
      overflow: hidden;
    }

    .ev-stream {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 8px;
      font-weight: 500;
      padding: 1px 4px;
      border-radius: 2px;
      background: rgba(0, 0, 0, 0.2);
      color: rgba(255, 255, 255, 0.8);
      text-transform: uppercase;
      letter-spacing: 0.3px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .ev-type-badge {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 7px;
      font-weight: 500;
      padding: 1px 4px;
      border-radius: 2px;
      background: rgba(0, 0, 0, 0.15);
      color: rgba(0, 0, 0, 0.55);
      text-transform: uppercase;
      letter-spacing: 0.3px;
      white-space: nowrap;
      flex-shrink: 0;
      border: 1px solid rgba(0, 0, 0, 0.1);
    }

    .ev-title {
      font-size: 11px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: rgba(0, 0, 0, 0.8);
    }

    .ev-time {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 9px;
      color: rgba(0, 0, 0, 0.5);
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .ev-effective {
      font-size: 8px;
      color: rgba(0, 0, 0, 0.38);
      font-style: italic;
    }

     
    .ev.form-inperson {
      background: var(--c-inperson);
    }

    .ev.form-instructor {
      background: var(--c-instructor);
    }

    .ev.form-wbt {
      background: var(--c-wbt);
    }

    .ev.form-project {
      background: var(--c-project);
    }

    .ev.form-other {
      background: var(--c-other);
    }

     
    .fab-stack {
      position: fixed;
      bottom: 24px;
      right: 24px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      z-index: 999;
    }

    .fab {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      display: grid;
      place-items: center;
      cursor: pointer;
      transition: transform 0.12s, box-shadow 0.12s;
    }

    .fab:hover {
      transform: translateY(-2px);
    }

    .fab svg {
      width: 14px;
      height: 14px;
      stroke: #fff;
      stroke-width: 2.5;
      stroke-linecap: round;
      fill: none;
    }

    .fab-add {
      background: var(--accent);
      box-shadow: 0 4px 14px rgba(79, 142, 247, 0.35);
    }

    .fab-add:hover {
      box-shadow: 0 6px 20px rgba(79, 142, 247, 0.45);
    }

    .fab-top {
      background: var(--surface3);
      border: 1px solid var(--border2);
      box-shadow: none;
    }

    .fab-top svg {
      stroke: var(--text2);
    }

    .fab-csv {
      background: var(--surface3);
      border: 1px solid var(--border2);
      box-shadow: none;
    }

    .fab-csv svg {
      stroke: var(--text2);
    }

    .fab-csv:hover {
      background: var(--surface2);
      border-color: var(--accent);
    }

    .fab-csv:hover svg {
      stroke: var(--accent);
    }

    .toast {
      position: fixed;
      bottom: 72px;
      right: 24px;
      background: #7f1d1d;
      border: 1px solid #f87171;
      color: #fca5a5;
      font-size: 12px;
      padding: 10px 16px;
      border-radius: 8px;
      max-width: 280px;
      z-index: 9999;
      display: none;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.4);
    }

    .no-events {
      padding: 60px 0;
      text-align: center;
      color: var(--text3);
      font-size: 14px;
    }

    .day-empty .timeline {
      height: 32px !important;
      opacity: 0.35;
    }

    .day-empty .timeline::before {
      opacity: 0.4;
    }

    .day-name--empty {
      color: var(--text3);
      font-weight: 400;
    }

    .day-empty .day-date {
      opacity: 0.5;
    }

     
    .drawer-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.55);
      z-index: 800;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.22s;
    }

    .drawer-overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    .drawer {
      position: fixed;
      right: 0;
      top: 0;
      bottom: 0;
      width: 360px;
      max-width: 95vw;
      background: var(--surface);
      border-left: 1px solid var(--border2);
      z-index: 801;
      transform: translateX(100%);
      transition: transform 0.26s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .drawer.open {
      transform: translateX(0);
    }

    .drawer-color-bar {
      height: 4px;
      flex-shrink: 0;
      transition: background 0.2s;
    }

    .drawer-head {
      padding: 20px 44px 14px 20px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .drawer-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.35;
      margin-bottom: 10px;
    }

    .drawer-meta {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .d-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 9px;
      font-weight: 500;
      padding: 3px 8px;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .d-badge-form-inperson {
      background: rgba(245, 197, 66, 0.15);
      color: var(--c-inperson);
      border: 1px solid rgba(245, 197, 66, 0.25);
    }

    .d-badge-form-instructor {
      background: rgba(248, 113, 113, 0.15);
      color: var(--c-instructor);
      border: 1px solid rgba(248, 113, 113, 0.25);
    }

    .d-badge-form-wbt {
      background: rgba(90, 180, 245, 0.15);
      color: var(--c-wbt);
      border: 1px solid rgba(90, 180, 245, 0.25);
    }

    .d-badge-form-project {
      background: rgba(251, 146, 60, 0.15);
      color: var(--c-project);
      border: 1px solid rgba(251, 146, 60, 0.25);
    }

    .d-badge-form-other {
      background: rgba(160, 168, 192, 0.15);
      color: var(--c-other);
      border: 1px solid rgba(160, 168, 192, 0.25);
    }

    .d-badge-stream {
      background: rgba(79, 142, 247, 0.1);
      color: var(--accent);
      border: 1px solid rgba(79, 142, 247, 0.2);
    }

    .d-badge-type {
      background: rgba(255, 255, 255, 0.04);
      color: var(--text2);
      border: 1px solid var(--border2);
    }

    .drawer-body {
      flex: 1;
      overflow-y: auto;
      padding: 18px 20px 24px;
      scrollbar-width: thin;
      scrollbar-color: var(--border2) transparent;
    }

    .d-time-block {
      background: var(--surface2);
      border-radius: 8px;
      padding: 12px 16px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .d-time-main {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 20px;
      font-weight: 500;
      color: var(--text);
      letter-spacing: -0.5px;
    }

    .d-time-sep {
      color: var(--text3);
      padding: 0 4px;
    }

    .d-dur-wrap {
      margin-left: auto;
      text-align: right;
    }

    .d-dur-lbl {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 9px;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 2px;
    }

    .d-dur-val {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
    }

    .d-split-info {
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: 6px;
      padding: 8px 12px;
      font-size: 11px;
      color: var(--text2);
      margin-bottom: 14px;
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .d-section {
      margin-bottom: 4px;
    }

    .d-row {
      display: flex;
      gap: 12px;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
      align-items: flex-start;
    }

    .d-row:last-child {
      border-bottom: none;
    }

    .d-key {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 9px;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      width: 72px;
      flex-shrink: 0;
      padding-top: 2px;
    }

    .d-val {
      font-size: 12px;
      color: var(--text2);
      line-height: 1.5;
      flex: 1;
      word-break: break-word;
    }

    .d-val a {
      color: var(--accent);
      text-decoration: none;
    }

    .d-val a:hover {
      text-decoration: underline;
    }

    .d-meeting {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
      margin-top: 14px;
    }

    .d-meeting-lbl {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 9px;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 6px;
    }

    .d-meeting-id {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 14px;
      color: var(--text);
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }

    .d-meeting-pass {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: var(--text2);
    }

    .drawer-close {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 28px;
      height: 28px;
      display: grid;
      place-items: center;
      border-radius: 6px;
      cursor: pointer;
      background: var(--surface2);
      border: 1px solid var(--border);
      transition: background 0.12s;
    }

    .drawer-close:hover {
      background: var(--surface3);
    }

    .drawer-close svg {
      width: 12px;
      height: 12px;
      stroke: var(--text2);
      stroke-width: 2;
      stroke-linecap: round;
      fill: none;
    }

    .filter-select {
      height: 28px;
      padding: 0 10px;
      font-size: 12px;
      font-family: 'Space Grotesk', sans-serif;
      color: var(--text);
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      outline: none;
      cursor: pointer;
    }

    .filter-select:hover {
      border-color: var(--border2);
    }

    .filter-select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px var(--accent-dim);
    }

    .lunch-band {
      position: absolute;
      top: 0;
      bottom: 0;
      background: rgba(255, 255, 255, 0.08);
      border-left: 1px dashed rgba(255, 255, 255, 0.15);
      border-right: 1px dashed rgba(255, 255, 255, 0.15);
      z-index: 0;
      pointer-events: none;
    }

    body.drag-active .day-empty .timeline {
      opacity: 0.55;
    }

    .d-dur-input {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      background: transparent;
      border: none;
      border-bottom: 1.5px solid var(--border2);
      outline: none;
      width: 58px;
      text-align: right;
      font-family: 'IBM Plex Mono', monospace;
      padding: 2px 2px;
      border-radius: 3px 3px 0 0;
      transition: border-color 0.15s, background 0.15s;
      cursor: text;
    }

    .d-dur-input:focus {
      border-bottom-color: var(--accent);

  function log() {

  }

  function warn() {
    if (enabled && opts.consoleWarn) console.warn.apply(console, arguments);
  }

  function error() {
    if (opts.consoleError) console.error.apply(console, arguments);
  }

  function run(fn) {
    if (!enabled || typeof fn !== 'function') return;
    try {
      return fn();
    } catch (err) {
      error('[DEBUG][RUN_ERROR]', err);
    }
  }

  return {
    enabled,
    options: opts,
    log,
    warn,
    error,
    run
  };
})();

function setBootState(state) {
 const overlay = document.getElementById('bootOverlay');
 const title = document.getElementById('bootTitle');
 const message = document.getElementById('bootMessage');

 if (!overlay || !title || !message) return;

 overlay.classList.remove('error');

 if (state === 'loading') {
  title.textContent = 'Loading Training Calendar…';
  message.textContent = '';
  return;
 }

 if (state === 'slow') {
  title.textContent = 'Still loading…';
  message.textContent = 'Fetching data from Google Sheets.';
  return;
 }

 if (state === 'error') {
  overlay.classList.add('error');
  title.textContent = 'Could not load Training Calendar.';
  message.textContent = '';
 }
}

function showBootOverlay() {
 const overlay = document.getElementById('bootOverlay');
 if (!overlay) return;
 overlay.classList.remove('hidden');
}

function hideBootOverlay() {
 const overlay = document.getElementById('bootOverlay');
 if (!overlay) return;
 overlay.classList.add('hidden');
}

function clearBootSlowTimer() {
 if (bootSlowTimer) {
  clearTimeout(bootSlowTimer);
  bootSlowTimer = null;
 }
}

function startInitialLoad() {
 showBootOverlay();
 setBootState('loading');
 clearBootSlowTimer();

 
 if (window.IS_STATIC_SNAPSHOT) {
   setTimeout(() => {
     try {
       initApp(window.STATIC_PAYLOAD);
       hideBootOverlay();

       
       const refreshBtn = document.getElementById('refreshBtn');
       if (refreshBtn) refreshBtn.style.display = 'none';

       const saveStatus = document.getElementById('saveStatus');
       if (saveStatus) saveStatus.style.display = 'none';

     } catch (err) {
       Debug.error('[BOOT][STATIC_ERROR]', err);
       setBootState('error');
     }
   }, 50);
   return;
 }

 bootSlowTimer = setTimeout(() => {
  setBootState('slow');
 }, 3000);

 google.script.run
  .withSuccessHandler(payload => {
   try {
    clearBootSlowTimer();
    initApp(payload);
    hideBootOverlay();
   } catch (err) {
    Debug.error('[BOOT][RENDER_ERROR]', err);
    setBootState('error');
   }
  })
  .withFailureHandler(err => {
   clearBootSlowTimer();
   Debug.error('[BOOT][LOAD_FAILURE]', err);
   setBootState('error');
  })
  .getCalendarData();
}

function renderFilters() {

      .filter(Boolean)
  )].sort((a, b) => a.localeCompare(b));

    opt.textContent = h;

  typeSel.value   = activeType;
  formSel.value   = activeForm;

  Debug.log('[FILTER][RENDER]', { stream: activeStream, type: activeType, form: activeForm, host: activeHost });

function renderCalendar() {

function renderWeek(week, days) {
  const wrap = document.createElement('div');
  wrap.className = 'week-block';
  wrap.dataset.week = week;

  const dates = Object.keys(days).sort();

  let tally = 0;
  dates.forEach(d => tally += days[d].length);

  const first = dates[0];
  const last = dates[dates.length - 1];

  const range = `${fmtShort(first)} – ${fmtShort(last)}`;

  wrap.innerHTML = `
    <div class="ruler-wrap">
      <div class="ruler-pad"></div>
      <div class="ruler-ticks">
        ${buildRuler()}
      </div>
    </div>

    <div class="week-header">
      <span class="week-num">${week}</span>
      <span class="week-prog">Program week ${week}</span>
      <span class="week-range">${range}</span>
      <span class="week-tally">${tally} sessions</span>
    </div>
  `;

  dates.forEach(date => {
    wrap.appendChild(renderDay(date, days[date]));
  });

  return wrap;
}

function buildRuler() {
  let html = '';

  for (let i = 0; i <= 9; i++) {
    const hour = 9 + i;
    const pct = (i / 9) * 100;

    html += `
      <div class="rtick" style="left:${pct}%">
        ${hour}:00
      </div>
    `;
  }

  return html;
}

/* ============================================================
   DAY RENDER
============================================================ */

function renderDay(date, events) {
  const row = document.createElement('div');
  row.className = 'day-row';
  row.dataset.date = date;

  const isEmpty = events.length === 0;

  if (isEmpty) row.classList.add('day-empty');

  const label = document.createElement('div');
  label.className = 'day-label';

  label.innerHTML = `
    <div class="day-name ${isEmpty ? 'day-name--empty' : ''}">
      ${fmtDay(date)}
    </div>
    <div class="day-date">
      ${fmtShort(date)}
    </div>
  `;

  const timeline = document.createElement('div');
  timeline.className = 'timeline';

  addLunchBand(timeline);

  events
    .sort((a, b) => timeToMin(a.from) - timeToMin(b.from))
    .forEach(ev => {
      timeline.appendChild(renderEvent(ev));
    });

  row.appendChild(label);
  row.appendChild(timeline);

  requestAnimationFrame(() => recalcRow(row));

  return row;
}

/* ============================================================
   EVENT RENDER
============================================================ */

function renderEvent(ev) {
  const el = document.createElement('div');

  const rawStart = timeToMin(ev.from);
  const duration = parseInt(ev.duration || 0);
  const adj = adjustForLunch(rawStart, duration);

  const visualStart = adj.adjustedStart;
  const visualEnd = adj.adjustedEnd;

  const left = ((visualStart - S_MIN) / SPAN_MIN) * 100;
  const width = ((visualEnd - visualStart) / SPAN_MIN) * 100;

  let splitClass = '';

  if (ev.splitGroup && Number(ev.splitTotal || 1) > 1) {
    splitClass = Number(ev.splitIdx || 0) === 0
      ? 'split-start'
      : 'split-continue';
  }

  el.className = `ev ${ev.formClass || 'form-other'} ${splitClass}`.trim();

  if (USER_CONTEXT && canEditEvent(ev)) {
    el.classList.add('ev--editable');
  }

  el.style.left = left + '%';
  el.style.width = width + '%';

  Object.keys(ev).forEach(k => {
    if (ev[k] != null) {
      el.dataset[k] = ev[k];
    }
    if (Array.isArray(ev.streams)) {
      el.dataset.streams = ev.streams.join(',');
    }
  });

  el.dataset.visualEnd = minToTime(visualEnd);

  const to = minToTime(visualEnd);

  const splitLabel =
    ev.splitGroup && Number(ev.splitTotal || 1) > 1
      ? `<span class="ev-effective">(${Number(ev.splitIdx || 0) + 1}/${ev.splitTotal})</span>`
      : '';

  const hasAgenda = !!(ev.hasAgenda || ev.agendaSheet);
  const agendaButton = hasAgenda
    ? `<button class="event-agenda-btn" data-agenda-event-id="${esc(ev.sourceId || ev.id)}" onclick="event.stopPropagation(); openAgendaModal('${esc(ev.sourceId || ev.id)}', '${esc(ev.title || '')}')">Agenda</button>`
    : '';

  
  el.innerHTML = `
      <div class="ev-inner">
        <div class="ev-top">
          <span class="ev-stream">
            ${esc((ev.streams && ev.streams.join(', ')) || ev.stream || '')}
          </span>
          <span class="ev-type-badge">
            ${esc((ev.programType || '').replace('Web Based Training', 'WBT'))}
          </span>
          <span class="ev-title">${esc(ev.title || '')}</span>
          ${agendaButton}
        </div>
        <div class="ev-time">
          <span>${esc(ev.from || '')} – ${esc(to)}</span>
          ${splitLabel}
        </div>
      </div>
    `;


  return el;
}

function parseIsoDateLocal(iso) {
  const parts = String(iso).split('-');
  return new Date(Number(parts[0]), Number(parts[1]) - 1, Number(parts[2]));
}

function formatIsoDateLocal(date) {
  return (
    date.getFullYear() +
    '-' +
    String(date.getMonth() + 1).padStart(2, '0') +
    '-' +
    String(date.getDate()).padStart(2, '0')
  );
}

function nextWorkdayIso(iso) {
  const d = parseIsoDateLocal(iso);
  d.setDate(d.getDate() + 1);

  while (d.getDay() === 0 || d.getDay() === 6) {
    d.setDate(d.getDate() + 1);
  }

  return formatIsoDateLocal(d);
}

function normalizeWorkdayIso(iso) {
  const d = parseIsoDateLocal(iso);

  while (d.getDay() === 0 || d.getDay() === 6) {
    d.setDate(d.getDate() + 1);
  }

  return formatIsoDateLocal(d);
}

function getProgramWeekJs(iso) {
  const start = parseIsoDateLocal(PROGRAM_START_ISO);
  const d = parseIsoDateLocal(iso);

  start.setHours(0, 0, 0, 0);
  d.setHours(0, 0, 0, 0);

  const diff = Math.floor((d - start) / (7 * 24 * 60 * 60 * 1000));
  return Math.max(1, diff + 1);
}

function availableLearningMinutesUntilEndOfDay(startMin) {
  let start = Math.max(startMin, WORKDAY_START_MIN);

  if (start >= WORKDAY_END_MIN) return 0;

  if (start >= LUNCH_START_MIN && start < LUNCH_END_MIN) {
    start = LUNCH_END_MIN;
  }

  let available = WORKDAY_END_MIN - start;

  const lunchOverlap = Math.max(
    0,
    Math.min(WORKDAY_END_MIN, LUNCH_END_MIN) -
    Math.max(start, LUNCH_START_MIN)
  );

  available -= lunchOverlap;

  return Math.max(0, available);
}

function addLearningMinutesSameDay(startMin, learningMinutes) {
  let cursor = Math.max(startMin, WORKDAY_START_MIN);
  let remaining = Number(learningMinutes || 0);

  if (cursor >= LUNCH_START_MIN && cursor < LUNCH_END_MIN) {
    cursor = LUNCH_END_MIN;
  }

  while (remaining > 0) {
    if (cursor < LUNCH_START_MIN) {
      const chunkEnd = Math.min(LUNCH_START_MIN, WORKDAY_END_MIN);
      const chunk = Math.min(remaining, chunkEnd - cursor);

      cursor += chunk;
      remaining -= chunk;

      if (remaining > 0 && cursor === LUNCH_START_MIN) {
        cursor = LUNCH_END_MIN;
      }

      continue;
    }

    if (cursor >= LUNCH_START_MIN && cursor < LUNCH_END_MIN) {
      cursor = LUNCH_END_MIN;
      continue;
    }

    const chunkEnd = WORKDAY_END_MIN;
    const chunk = Math.min(remaining, chunkEnd - cursor);

    cursor += chunk;
    remaining -= chunk;
  }

  return cursor;
}

function adjustForLunch(fromMin, duration) {

  const LUNCH_START = 12 * 60;
  const LUNCH_END = 13 * 60;

  let start = fromMin;
  let end = start + duration;

  if (end > LUNCH_START && start < LUNCH_END) {

    const overlap =
      Math.min(end, LUNCH_END) -
      Math.max(start, LUNCH_START);

    end = start + duration + Math.max(0, overlap);
  }

  return {
    adjustedStart: start,
    adjustedEnd: end
  };
}




function detectConflicts(evs) {
 evs.forEach(ev => {
  ev.classList.remove('conflict');
  ev.title = ev.dataset.title || '';
 });

 for (let i = 0; i < evs.length; i++) {
  for (let j = i + 1; j < evs.length; j++) {
    if (!audiencesOverlap(evs[i], evs[j])) continue;

   const a1 = timeToMin(evs[i].dataset.from);
   const a2 = timeToMin(
    computeTo(
     evs[i].dataset.from,
     parseInt(evs[i].dataset.duration)
    )
   );
   const b1 = timeToMin(evs[j].dataset.from);
   const b2 = timeToMin(
    computeTo(
     evs[j].dataset.from,
     parseInt(evs[j].dataset.duration)
    )
   );

   if (Math.max(a1, b1) < Math.min(a2, b2)) {
    evs[i].classList.add('conflict');
    evs[j].classList.add('conflict');

    evs[i].title = evs[i].dataset.title || '';
    evs[j].title = evs[j].dataset.title || '';

    if (DEBUG_CONFLICTS) {
      Debug.log('[CONFLICT]', {
        aId: evs[i].dataset.id,
        aTitle: evs[i].dataset.title,
        aStream: evs[i].dataset.stream,
        aFrom: evs[i].dataset.from,
        aTo: computeTo(evs[i].dataset.from, parseInt(evs[i].dataset.duration)),
        bId: evs[j].dataset.id,
        bTitle: evs[j].dataset.title,
        bStream: evs[j].dataset.stream,
        bFrom: evs[j].dataset.from,
        bTo: computeTo(evs[j].dataset.from, parseInt(evs[j].dataset.duration))
      });
    }
   }
  }
 }
}

function recalcRow(row) {

  const evs = [...row.querySelectorAll('.ev')]
    .filter(ev => ev.style.display !== 'none')
    .sort((a, b) =>

}

function getDragTargetRow(e) {
  const stack = document.elementsFromPoint(e.clientX, e.clientY);

  for (let i = 0; i < stack.length; i++) {
    const row = stack[i].closest && stack[i].closest('.day-row');

    if (row) {
      return row;
    }
  }

  const rows = [...document.querySelectorAll('.day-row')]
    .filter(row => row.offsetParent !== null);

  if (!rows.length) {
    return dragCurrentRow;
  }

  let bestRow = dragCurrentRow;
  let bestDistance = Infinity;

  rows.forEach(row => {
    const rect = row.getBoundingClientRect();

    if (e.clientY >= rect.top && e.clientY <= rect.bottom) {
      bestRow = row;
      bestDistance = 0;
      return;
    }

    const center = rect.top + rect.height / 2;
    const distance = Math.abs(e.clientY - center);

    if (distance < bestDistance) {
      bestDistance = distance;
      bestRow = row;
    }
  });

  return bestRow || dragCurrentRow;
}

function markRowActiveForDrag(row) {
  if (!row) return;

  row.classList.remove('day-empty');

  const name = row.querySelector('.day-name');

  if (name) {
    name.classList.remove('day-name--empty');
  }

  const tl = row.querySelector('.timeline');

  if (tl) {
    tl.style.opacity = '';
  }
}

function moveDragEventToRow(ev, targetRow) {
  if (!ev || !targetRow) return;

  const currentRow = ev.closest('.day-row');

  if (currentRow === targetRow) return;

  const targetTimeline = targetRow.querySelector('.timeline');

  if (!targetTimeline) return;

  targetTimeline.appendChild(ev);
  markRowActiveForDrag(targetRow);

  if (currentRow) {
    recalcRow(currentRow);
  }

  recalcRow(targetRow);

  dragCurrentRow = targetRow;
}

function canEditEvent(evOrEl) {
  if (!USER_CONTEXT) return false;
  if (USER_CONTEXT.role === 'admin') return true;

  const rawStreams = evOrEl.dataset
    ? (evOrEl.dataset.streams || evOrEl.dataset.streamRaw || '')
    : String((evOrEl.streams || []).join(',') || evOrEl.streamRaw || evOrEl.stream || '');

  const eventStreams = rawStreams.split(',').map(s => s.trim()).filter(Boolean);

  const programType = evOrEl.dataset
    ? String(evOrEl.dataset.programType || '')
    : String(evOrEl.programType || '');

  const host = evOrEl.dataset
    ? String(evOrEl.dataset.host || '')
    : String(evOrEl.host || '');

  if (USER_CONTEXT.name && host &&
      host.toLowerCase().includes(USER_CONTEXT.name.toLowerCase())) {
    return true;
  }

  if (USER_CONTEXT.role === 'instructor') return false;
  if (USER_CONTEXT.role === 'intern') return false;

  if (USER_CONTEXT.isScrumMaster) {
    const isAgile = programType.toLowerCase().includes('agile');
    if (!isAgile) return false;
    return eventStreams.some(es =>
      USER_CONTEXT.streams.some(us => us.toLowerCase() === es.toLowerCase())
    );
  }

  if (USER_CONTEXT.role === 'mentor') {
    if (eventStreams.some(s => s.toLowerCase() === 'common')) return false;
    if (programType.toLowerCase() === 'program milestone') return false;
    return eventStreams.some(es =>
      USER_CONTEXT.streams.some(s => s.toLowerCase() === es.toLowerCase())
    );
  }

  return false;
}

document.addEventListener('mousemove', e => {
  if (!dragEv) return;

  const dx = e.clientX - dragStartX;
  const dy = e.clientY - dragStartY;
  const distance = Math.sqrt(dx * dx + dy * dy);

  if (!dragMoved && distance < DRAG_THRESHOLD_PX) {
    return;
  }

  if (!dragMoved) {
    dragMoved = true;

    document.body.classList.add('drag-active');
    dragEv.classList.add('dragging');
    document.body.style.userSelect = 'none';

    if (dragEv.dataset.splitGroup) {
      const groupId = dragEv.dataset.splitGroup;
      document.querySelectorAll(`.ev[data-split-group="${groupId}"]`)
        .forEach(el => el.classList.add('dragging'));
    }

    Debug.log('[DRAG][START]', {
      id: dragEv.dataset.id,
      sourceId: dragEv.dataset.sourceId,
      date: dragStartRow ? dragStartRow.dataset.date : '',
      from: dragEv.dataset.from
    });
  }

  const targetRow = getDragTargetRow(e);

  if (targetRow && targetRow !== dragCurrentRow) {
    const previousRow = dragCurrentRow;

    cleanupSplitPreview();
    moveDragEventToRow(dragEv, targetRow);

    Debug.log('[DRAG][ROW_CHANGE]', {
      id: dragEv.dataset.sourceId || dragEv.dataset.id,
      fromDate: previousRow ? previousRow.dataset.date : '',
      toDate: targetRow.dataset.date
    });
  }

  const row = dragEv.closest('.day-row');

  if (!row) return;

  const tl = row.querySelector('.timeline');

  if (!tl || !tl.clientWidth) return;

  const rawPct =
    dragOrigLeft + dx / tl.clientWidth * 100;

  const snapped = Math.max(
    0,
    Math.min(100, snapToGrid(rawPct))
  );

  let fromMin =
    S_MIN + Math.round(
      snapped / 100 * SPAN_MIN / SNAP_MIN
    ) * SNAP_MIN;

  const duration = parseInt(
    dragEv.dataset.rawDuration ||
    dragEv.dataset.duration ||
    0
  );

  if (isFlexibleAutoFlowEl(dragEv)) {
  fromMin = Math.min(fromMin, WORKDAY_END_MIN - SNAP_MIN);

  dragEv.dataset.from = minToTime(fromMin);

  renderFlexibleDragPreview(
    dragEv,
    row.dataset.date,
    minToTime(fromMin),
    duration
  );

  return;
}

  dragEv.dataset.from = minToTime(fromMin);

  const pct =
    (fromMin - S_MIN) / SPAN_MIN * 100;

  dragEv.style.left = pct + '%';

  const adj = adjustForLunch(fromMin, duration);
  const visual = adj.adjustedEnd - adj.adjustedStart;

  dragEv.dataset.visualEnd = minToTime(adj.adjustedEnd);
  dragEv.style.width = (visual / SPAN_MIN * 100) + '%';

  const toStr = minToTime(adj.adjustedEnd);
  const timeEl = dragEv.querySelector('.ev-time span:last-child');

  if (timeEl) {
    timeEl.textContent = `${dragEv.dataset.from} – ${toStr}`;
  }

  recalcRow(row);
});

function timeToMin(t) {
  if (!t) return 0;

  const [h, m] = t.split(':').map(Number);
  return h * 60 + m;
}

function minToTime(m) {
  return String(Math.floor(m / 60))
    .padStart(2, '0') +
    ':' +
    String(m % 60).padStart(2, '0');
}

function computeTo(from, duration) {
  return minToTime(
    timeToMin(from) + duration
  );
}

function formatDuration(m) {

  const h = Math.floor(m / 60);
  const mm = m % 60;

  if (h > 0) {
    return mm > 0
      ? `${h}h ${mm}m`
      : `${h}h`;
  }

  return `${mm}m`;
}

function esc(s) {
  return String(s || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function fmtFull(iso) {
  if (!iso) return '';

  const parts = iso.split('-');
  const y = Number(parts[0]);
  const m = Number(parts[1]);
  const d = Number(parts[2]);

  const dt = new Date(y, m - 1, d);

  return dt.toLocaleDateString('en-US', {
    weekday: 'long',
    month: 'short',
    day: '2-digit',
    year: 'numeric'
  });
}

function fmtShort(iso) {
 if (!iso) return '';

 const parts = iso.split('-');
 const y = Number(parts[0]);
 const m = Number(parts[1]);
 const d = Number(parts[2]);

 const dt = new Date(y, m - 1, d);

 const MONTH_SHORT = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

 return MONTH_SHORT[dt.getMonth()] + ' ' + String(dt.getDate()).padStart(2, '0');

function ensureDayRow(date) {
  let row = document.querySelector(`.day-row[data-date="${date}"]`);

  if (row) return row;

  const week = String(getProgramWeekJs(date));
  let weekBlock = document.querySelector(`.week-block[data-week="${week}"]`);

  if (!weekBlock) {
    const days = {};
    days[date] = [];
    weekBlock = renderWeek(week, days);
    document.getElementById('calendar').appendChild(weekBlock);
    return document.querySelector(`.day-row[data-date="${date}"]`);
  }

  row = renderDay(date, []);

  const existingRows = [...weekBlock.querySelectorAll('.day-row')];
  const nextRow = existingRows.find(r => r.dataset.date > date);

  if (nextRow) {
    weekBlock.insertBefore(row, nextRow);
  } else {

  }

  return row;
}

function getLaneGroupDate(ev) {
  const row = ev.closest('.day-row');
  return row && row.dataset.date
    ? row.dataset.date
    : (ev.dataset.date || '');
}

function overlapsAny(intervals, laneEnd) {
  return intervals.some(int => int.start < laneEnd && int.end > 0);
}

function buildLaneGroups(evs, useVisual) {
  const groups = new Map();

  evs.forEach((ev, idx) => {
    const date = getLaneGroupDate(ev);
    const splitGroup = ev.dataset.splitGroup || '';

    const key = splitGroup
      ? 'split|' + splitGroup + '|' + date
      : 'single|' + idx + '|' + (ev.dataset.id || '');

    if (!groups.has(key)) {
      groups.set(key, {
        key,
        events: [],
        intervals: []
      });
    }

    const group = groups.get(key);

    const start = useVisual
      ? visualStartMinForEl(ev)
      : normalStartMinForEl(ev);

    const end = useVisual
      ? visualEndMinForEl(ev)
      : normalEndMinForEl(ev);

    group.events.push(ev);
    group.intervals.push({ start, end });
  });

  return [...groups.values()]
    .map(group => {
      group.events.sort((a, b) => {
        const aStart = useVisual
          ? visualStartMinForEl(a)
          : normalStartMinForEl(a);

        const bStart = useVisual
          ? visualStartMinForEl(b)
          : normalStartMinForEl(b);

        return aStart - bStart;
      });

      
      group.start = Math.min(...group.intervals.map(i => i.start));
      group.maxEnd = Math.max(...group.intervals.map(i => i.end));

      return group;
    })
    .sort((a, b) => {
      if (a.start !== b.start) return a.start - b.start;
      return b.maxEnd - a.maxEnd;
    });
}

function applyGroupedLanes(evs, useVisual) {
  const groups = buildLaneGroups(evs, useVisual);

  const lanes = []; 

  groups.forEach(group => {
    let laneIdx = -1;

    for (let i = 0; i < lanes.length; i++) {

      const overlaps = group.intervals.some(g =>
        lanes[i].some(l =>
          g.start < l.end && l.start < g.end
        )
      );

      if (!overlaps) {
        laneIdx = i;
        break;
      }
    }

    if (laneIdx === -1) {
      laneIdx = lanes.length;
      lanes.push([...group.intervals]);
    } else {
      lanes[laneIdx].push(...group.intervals);
    }

    group.events.forEach(ev => {
      ev._lane = laneIdx;
      ev.style.top = (laneIdx * LANE_H + 3) + 'px';
    });
  });

  return lanes.length;
}

function normalStartMinForEl(ev) {
  const start = timeToMin(ev.dataset.from);
  const duration = parseInt(ev.dataset.duration || 0);
  const adj = adjustForLunch(start, duration);
  return adj.adjustedStart;
}

function normalEndMinForEl(ev) {
  const start = timeToMin(ev.dataset.from);
  const duration = parseInt(ev.dataset.duration || 0);
  const adj = adjustForLunch(start, duration);
  return adj.adjustedEnd;
}

function applyLanes(evs) {
  applyGroupedLanes(evs, false);
}

function applyLanesVisual(evs) {
  return applyGroupedLanes(evs, true);
}

function recalcRowsVisual(rows) {
  rows.forEach(row => {
    if (!row) return;

    const evs = [...row.querySelectorAll('.ev')]
      .filter(ev => ev.style.display !== 'none')
      .sort((a, b) => visualStartMinForEl(a) - visualStartMinForEl(b));

    const lanes = applyLanesVisual(evs);
    detectConflicts(evs);

    const tl = row.querySelector('.timeline');
    if (tl) {
      tl.style.height = Math.max(LANE_H, lanes * LANE_H + 6) + 'px';
    }
  });
}

function rebuildCalendarFromRawData() {
  const expanded = expandEventsOnFrontend(RAW_EVENTS);
  const calendarData = groupByWeekAndDayOnFrontend(expanded);

  DATA = {
    calendarData,
    totalEvents: RAW_EVENTS.length,
    totalWeeks: Object.keys(calendarData).length,

  };
}


function expandEventsOnFrontend(events) {
  const result = [];

  events.forEach(ev => {
    if (!isFlexibleAutoFlowEvent(ev)) {
      result.push(Object.assign({}, ev, {
        sourceId: String(ev.id),
        rawDuration: ev.duration
      }));
      return;
    }

    const parts = splitFlexibleForPreview(
      ev.id,
      ev.streams,   // ← javítva
      ev.date,
      ev.from,
      ev.duration
    );

    if (parts.length <= 1) {
      result.push(Object.assign({}, ev, {
        sourceId: String(ev.id),
        rawDuration: ev.duration
      }));
      return;
    }

    const finalPart = parts[parts.length - 1];
    const fullEnd = finalPart.date + ' ' + finalPart.to;

    parts.forEach((part, idx) => {
      result.push(Object.assign({}, ev, {
        id: String(ev.id) + '__split' + (idx + 1),
        sourceId: String(ev.id),
        date: part.date,
        from: part.from,
        duration: part.duration,
        rawDuration: ev.duration,
        week: getProgramWeekJs(part.date),
        splitGroup: String(ev.id),
        splitIdx: idx,
        splitTotal: parts.length,
        splitOrigTo: fullEnd
      }));
    });
  });

  return result;
}

function isWbtEvent(ev) {
  return (
    ev &&
    (
      ev.formClass === 'form-wbt' ||
      String(ev.form || '').toLowerCase().includes('web based training')
    )
  );
}

function groupByWeekAndDayOnFrontend(events) {
  const result = {};

  if (!events.length) return result;

  const dates = events
    .map(ev => ev.date)
    .filter(Boolean)
    .sort();

  if (!dates.length) return result;

  const first = parseIsoDateLocal(dates[0]);
  const last = parseIsoDateLocal(dates[dates.length - 1]);

  first.setHours(0, 0, 0, 0);
  last.setHours(0, 0, 0, 0);

  const cursor = new Date(first);

  while (cursor <= last) {
    const day = cursor.getDay();

    if (day >= 1 && day <= 5) {
      const dateStr = formatIsoDateLocal(cursor);
      const week = getProgramWeekJs(dateStr);

      if (!result[week]) result[week] = {};
      if (!result[week][dateStr]) result[week][dateStr] = [];
    }

    cursor.setDate(cursor.getDate() + 1);
  }

events.forEach(ev => {
  if (!ev || !ev.date) return;

  const week = getProgramWeekJs(ev.date);

  if (!result[week]) result[week] = {};
  if (!result[week][ev.date]) result[week][ev.date] = [];

  result[week][ev.date].push(ev);
});



  Object.keys(result).forEach(week => {
    Object.keys(result[week]).forEach(date => {
      result[week][date].sort((a, b) => {

      });

function splitWbtForPreview(startDate, from, duration) {
  const parts = [];

  let date = normalizeWorkdayIso(startDate);
  let startMin = timeToMin(from);
  let remaining = Number(duration || 0);

  if (startMin < WORKDAY_START_MIN) {
    startMin = WORKDAY_START_MIN;
  }

  while (remaining > 0) {
    if (startMin >= WORKDAY_END_MIN) {
      date = nextWorkdayIso(date);
      startMin = WORKDAY_START_MIN;
      continue;
    }

    if (startMin >= LUNCH_START_MIN && startMin < LUNCH_END_MIN) {
      startMin = LUNCH_END_MIN;
    }

    const available = availableLearningMinutesUntilEndOfDay(startMin);

    if (available <= 0) {
      date = nextWorkdayIso(date);
      startMin = WORKDAY_START_MIN;
      continue;
    }

    const partDuration = Math.min(remaining, available);
    const visualEnd = addLearningMinutesSameDay(startMin, partDuration);

    parts.push({
      date,
      from: minToTime(startMin),
      fromMin: startMin,
      to: minToTime(visualEnd),
      toMin: visualEnd,
      duration: partDuration
    });

    remaining -= partDuration;

    if (remaining > 0) {
      date = nextWorkdayIso(date);
      startMin = WORKDAY_START_MIN;
    }
  }

  return parts;
}

function getBlockingIntervalsForDate(date, stream, sourceId, flexType) {
  return RAW_EVENTS
    .filter(ev => {
      if (!ev || !ev.date) return false;
      if (String(ev.id) === String(sourceId)) return false;
      if (ev.date !== date) return false;
      if (!isBlockingEvent(ev, flexType)) return false; 
      if (!audiencesOverlap({ streams: stream }, ev)) return false;

      return true;
    })
    .map(ev => {
      const start = timeToMin(ev.from);
      const adj = adjustForLunch(start, parseInt(ev.duration || 0));

      return {
        start: adj.adjustedStart,
        end: adj.adjustedEnd,
        id: ev.id,
        title: ev.title
      };
    })
    .filter(b => b.end > WORKDAY_START_MIN && b.start < WORKDAY_END_MIN)
    .map(b => ({
      start: Math.max(WORKDAY_START_MIN, b.start),
      end: Math.min(WORKDAY_END_MIN, b.end),
      id: b.id,
      title: b.title
    }))
    .sort((a, b) => a.start - b.start);
}

function normalizeFlexibleStart(date, startMin, stream, sourceId, flexType) {
  const effectiveEnd = getEffectiveWorkdayEndMinForDate(date);
  let cursor = Math.max(startMin, WORKDAY_START_MIN);

  if (cursor >= effectiveEnd) return effectiveEnd;
  if (cursor >= LUNCH_START_MIN && cursor < LUNCH_END_MIN) cursor = LUNCH_END_MIN;
  if (cursor >= effectiveEnd) return effectiveEnd;

  const blockers = getBlockingIntervalsForDate(date, stream, sourceId, flexType);
  let changed = true;

  while (changed) {
    changed = false;
    if (cursor >= LUNCH_START_MIN && cursor < LUNCH_END_MIN) {
      cursor = LUNCH_END_MIN;
      changed = true;
    }
    if (cursor >= effectiveEnd) return effectiveEnd;

    for (let i = 0; i < blockers.length; i++) {
      const b = blockers[i];
      if (cursor >= b.start && cursor < b.end) {
        cursor = b.end;
        changed = true;
        break;
      }
    }
  }
  return Math.min(cursor, effectiveEnd);
}

function getNextFlexibleBarrier(date, startMin, stream, sourceId, flexType) {
  let barrier = getEffectiveWorkdayEndMinForDate(date);

  if (startMin < LUNCH_START_MIN) {
    barrier = Math.min(barrier, LUNCH_START_MIN);
  }

  const blockers = getBlockingIntervalsForDate(date, stream, sourceId, flexType);

  blockers.forEach(b => {
    if (b.start > startMin) {
      barrier = Math.min(barrier, b.start);
    }
  });

  return barrier;
}

function splitFlexibleForPreview(sourceId, stream, startDate, from, duration) {
  const parts = [];

  
  let flexType = 'wbt';
  const sourceEv = RAW_EVENTS.find(e => String(e.id) === String(sourceId));
  if (sourceEv && (String(sourceEv.programType || '').toLowerCase() === 'assignment' || sourceEv.typeClass === 'assignment')) {
    flexType = 'assignment';
  }

  let date = normalizeWorkdayIso(startDate);
  let startMin = timeToMin(from);
  let remaining = Number(duration || 0);

  if (startMin < WORKDAY_START_MIN) {
    startMin = WORKDAY_START_MIN;
  }

  while (remaining > 0) {
    date = normalizeWorkdayIso(date);
    const effectiveEnd = getEffectiveWorkdayEndMinForDate(date);

    if (startMin >= effectiveEnd || startMin >= WORKDAY_END_MIN) {
      date = nextWorkdayIso(date);
      startMin = WORKDAY_START_MIN;
      continue;
    }

    
    startMin = normalizeFlexibleStart(date, startMin, stream, sourceId, flexType);

    if (startMin >= effectiveEnd || startMin >= WORKDAY_END_MIN) {
      date = nextWorkdayIso(date);
      startMin = WORKDAY_START_MIN;
      continue;
    }

    
    const barrier = getNextFlexibleBarrier(date, startMin, stream, sourceId, flexType);
    const available = barrier - startMin;

    if (available <= 0) {
      if (barrier === LUNCH_START_MIN) {
        startMin = LUNCH_END_MIN;
      } else {
        startMin = barrier;
      }
      continue;
    }

    const partDuration = Math.min(remaining, available);
    const endMin = startMin + partDuration;

    parts.push({
      date,
      from: minToTime(startMin),
      fromMin: startMin,
      to: minToTime(endMin),
      toMin: endMin,
      duration: partDuration
    });

    remaining -= partDuration;

    if (remaining > 0) {
      startMin = endMin;
      if (startMin === LUNCH_START_MIN) startMin = LUNCH_END_MIN;
      
      
      startMin = normalizeFlexibleStart(date, startMin, stream, sourceId, flexType);
      const nextEffectiveEnd = getEffectiveWorkdayEndMinForDate(date);
      if (startMin >= nextEffectiveEnd) {
        date = nextWorkdayIso(date);
        startMin = WORKDAY_START_MIN;
      }
    }
  }

  return parts;
}


function updateRawEvent(id, patch) {

}

function isFunFriday(ev) {
  const title = String(ev.title || '').toLowerCase();
  return title.startsWith('fun friday');
}

function getFunFridayCutoffMinForDate(date) {
  if (!ENABLE_FUN_FRIDAY_CUTOFF) return null;

  const funFridayEvents = RAW_EVENTS
    .filter(ev => ev && ev.date === date && isFunFriday(ev))
    .map(ev => timeToMin(ev.from))
    .filter(min => !isNaN(min))
    .sort((a, b) => a - b);

  return funFridayEvents.length ? funFridayEvents[0] : null;
}



function getEffectiveWorkdayEndMinForDate(date) {
  const funFridayCutoff = getFunFridayCutoffMinForDate(date);

  if (funFridayCutoff === null) {
    return WORKDAY_END_MIN;
  }

  return Math.min(WORKDAY_END_MIN, funFridayCutoff);
}

const VIEW_SCROLL_KEY = 'calendarScroll_v1';
const VIEW_SCROLL_TTL_MS = 12 * 60 * 60 * 1000;

let _scrollSaveTimer = null;

function saveScrollStateNow() {
  try {
    const payload = {
      y: window.scrollY || 0,
      ts: Date.now()
    };
    localStorage.setItem(VIEW_SCROLL_KEY, JSON.stringify(payload));
  } catch (e) {
    Debug.error('[VIEW][SCROLL_SAVE_ERROR]', e);
  }
}

function saveScrollStateThrottled() {
  if (_scrollSaveTimer) return;
  _scrollSaveTimer = setTimeout(() => {
    _scrollSaveTimer = null;
    saveScrollStateNow();
  }, 200);
}

function loadScrollState() {
  try {
    const raw = localStorage.getItem(VIEW_SCROLL_KEY);
    if (!raw) return null;

    const saved = JSON.parse(raw);
    if (!saved || typeof saved.y !== 'number') return null;

    if (saved.ts && Date.now() - saved.ts > VIEW_SCROLL_TTL_MS) {
      localStorage.removeItem(VIEW_SCROLL_KEY);
      return null;
    }

    return saved;
  } catch (e) {
    Debug.error('[VIEW][SCROLL_LOAD_ERROR]', e);
    return null;
  }
}

function restoreScrollAfterRender() {
  const saved = loadScrollState();
  if (!saved) return;

  const y = Math.max(0, saved.y);

  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      window.scrollTo(0, y);
      setTimeout(() => window.scrollTo(0, y), 80);
    });
  });

  Debug.log('[VIEW][SCROLL_RESTORE]', { y });
}

function initScrollPersistence() {
  window.addEventListener('scroll', saveScrollStateThrottled, { passive: true });
  window.addEventListener('beforeunload', e => {
    saveScrollStateNow();
    if (window._drawerHasDirty) {
      e.preventDefault();
      e.returnValue = '';
    }
  });
}




function minToHHMM(m) {
  const h = Math.floor(m / 60);
  const mm = m % 60;
  return h + ':' + String(mm).padStart(2, '0');
}

function parseDurationInput(str) {
  str = String(str || '').trim();
  if (str.includes(':')) {
    const parts = str.split(':');
    const h = parseInt(parts[0]) || 0;
    const mm = parseInt(parts[1]) || 0;
    if (mm < 0 || mm >= 60) return NaN;
    return h * 60 + mm;
  }
  const n = parseInt(str);
  return isNaN(n) ? NaN : n;
}

function saveDuration(sourceId, baseDurationMinutes) {
  const input = document.getElementById('durInput');
  if (input) input.disabled = true;

  setSaveStatus('saving', 'saving…');
  setSaveBtnState('saving');          
  showDrawerSavingOverlay();          

  const rawEv = RAW_EVENTS.find(ev => String(ev.id) === String(sourceId));
  if (rawEv) {
    rawEv.baseDuration = baseDurationMinutes;
    const mult = parseFloat(rawEv.durationMultiplier || 1);
    rawEv.duration = mult > 1
      ? Math.ceil(baseDurationMinutes * mult / 5) * 5
      : baseDurationMinutes;
  }

  Debug.log('[DURATION][SAVE][START]', { sourceId, baseDurationMinutes });

  google.script.run
    .withSuccessHandler(res => {
      Debug.log('[DURATION][SAVE][SUCCESS]', res);

      hideDrawerSavingOverlay();        
      setSaveBtnState('saved');         

      if (input) {
        input.disabled = false;
        const newStr = minToHHMM(baseDurationMinutes);
        input.value = newStr;
        input.dataset.original = newStr;
        input.classList.add('dur-saved');
        setTimeout(() => input && input.classList.remove('dur-saved'), 2000);
      }
      setSaveStatus('saved', 'all saved');
      refreshCalendarView();
    })
    .withFailureHandler(err => {
      Debug.error('[DURATION][SAVE][FAILURE]', err);

      hideDrawerSavingOverlay();        
      setSaveBtnState('idle');          

      if (input) {
        input.disabled = false;
        input.classList.add('dur-error');
        setTimeout(() => input && input.classList.remove('dur-error'), 2000);
      }
      setSaveStatus('error', 'save failed');

      
      const errEl = document.getElementById('dSaveError');
      if (errEl) {
        errEl.textContent = 'Save failed: ' + (err && err.message ? err.message : err);
      }

      showToast('Duration save failed: ' + (err && err.message ? err.message : err));
    })
    .saveEventDuration(sourceId, baseDurationMinutes);
}

        } else {
          flashEl(freshDur, 'dur-error');
        }
      }
      if (e.key === 'Escape') { freshDur.value = freshDur.dataset.original; freshDur.blur(); }
    });
  }
  

  
  const titleEl = document.getElementById('drawerTitle');
  if (titleEl) {
    const fresh = titleEl.cloneNode(true);
    titleEl.replaceWith(fresh);
    fresh.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        e.preventDefault();
        const val = fresh.value.trim();
        if (!val) { fresh.value = fresh.dataset.original; fresh.blur(); return; }
        if (val === fresh.dataset.original) { fresh.blur(); return; }
        saveField(sourceId, 'title', val, fresh);
        fresh.blur();
      }
      if (e.key === 'Escape') { fresh.value = fresh.dataset.original; fresh.blur(); updateDirtyState(); }
    });
    fresh.addEventListener('input', updateDirtyState);
  }

  
  document.querySelectorAll('#drawerBody .d-edit-input').forEach(input => {
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        e.preventDefault();
        const val = input.value.trim();
        if (val === (input.dataset.original || '').trim()) { input.blur(); return; }
        saveField(input.dataset.eventId, input.dataset.field, val, input);
        input.blur();
      }
      if (e.key === 'Escape') { input.value = input.dataset.original; input.blur(); updateDirtyState(); }
    });
    input.addEventListener('input', updateDirtyState);
  });

  
  document.querySelectorAll('#drawerBody .d-edit-textarea').forEach(ta => {

      ta.style.height = 'auto';
      ta.style.height = ta.scrollHeight + 'px';
    };

    ta.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        const val = ta.value;
        if (val === (ta.dataset.original || '')) { ta.blur(); return; }
        saveField(ta.dataset.eventId, ta.dataset.field, val, ta);
        ta.blur();
      }
      if (e.key === 'Escape') { ta.value = ta.dataset.original; ta.blur(); updateDirtyState(); }

      autoResize();
      updateDirtyState();
    });

  document.querySelectorAll('#drawerMeta select.d-badge').forEach(sel => {
    sel.addEventListener('change', () => {

      const value = sel.value;

      if (field === 'formClass') {
        const chosen = FORMS.find(f => f.val === value);
        const formText = chosen ? chosen.sheetVal : 'Other';
        const formClass = chosen ? chosen.val : 'form-other';
        updateRawEventForm(eventId, formText, formClass);
        sel.dataset.original = value;
        saveField(eventId, 'form', formText, sel);
        return;
      }

      if (field === 'typeClass') {

          RAW_EVENTS.find(ev => String(ev.id) === String(eventId))?.programType;

        updateRawEventType(eventId, value, programType);

}

function getStreamsFromValue(value) {

  return String(value || '')
    .split(',')
    .map(s => s.trim())
    .filter(Boolean);
}

function getEventStreams(evOrEl) {
  if (!evOrEl) return [];

  if (evOrEl.dataset) {
    return getStreamsFromValue(
      evOrEl.dataset.streams ||
      evOrEl.dataset.stream ||
      evOrEl.dataset.streamRaw
    );
  }

  return getStreamsFromValue(
    evOrEl.streams ||
    evOrEl.stream ||
    evOrEl.streamRaw
  );
}

function audiencesOverlap(a, b) {
  const arrA = getEventStreams(a);
  const arrB = getEventStreams(b);

  if (arrA.includes('Common') || arrB.includes('Common')) return true;
  return arrA.some(s => arrB.includes(s));

function submitAddEvent() {
  const get = id => document.getElementById(id);
  let valid = true;

  const mark = (id, bad) => {
    const el = get(id);
    if (!el) return;
    el.classList.toggle('invalid', bad);
    if (bad) valid = false;
  };

  get('m-error').textContent = '';

  const v = {
    stream:      get('m-stream').value,
    programType: get('m-programType').value,
    title:       get('m-title').value.trim(),
    form:        get('m-form').value,
    date:        get('m-date').value,
    from:        get('m-from').value,
    duration:    get('m-duration').value.trim(),
    host:        get('m-host').value.trim(),
    wbtLink:     get('m-wbtLink').value.trim(),
    ievolveId:   get('m-ievolveId').value.trim(),
    note:        get('m-note').value.trim()
  };

  
  mark('m-stream',      !v.stream);
  mark('m-programType', !v.programType);
  mark('m-title',       !v.title);
  mark('m-form',        !v.form);

  
  const dateVal = v.date;
  if (!dateVal || dateVal < PROGRAM_START_ISO || dateVal > PROGRAM_END_ISO) {
    mark('m-date', true);
    get('m-error').textContent = 'Date must be within program duration.';
  } else {
    mark('m-date', false);
  }

  
  if (!v.from) {
    mark('m-from', true);
  } else {
    const [h, m] = v.from.split(':').map(Number);
    const fromMin = h * 60 + m;

    if (fromMin < 9 * 60 || fromMin >= 18 * 60) {
      mark('m-from', true);
      if (!get('m-error').textContent)
        get('m-error').textContent = 'Start time must be between 09:00 and 18:00.';
    } else {
      mark('m-from', false);
    }
  }

  
  const durationMin = parseDurationInput(v.duration);
  if (isNaN(durationMin) || durationMin <= 0) {
    mark('m-duration', true);
    if (!get('m-error').textContent)
      get('m-error').textContent = 'Duration format: h:mm (e.g. 1:30)';
  } else {
    mark('m-duration', false);
  }

  const isInstructor = v.form === 'Instructor Led';
  const isInPerson   = v.form === 'In person';
  const isWbt        = v.form === 'Web Based Training';

  
  if ((isInstructor || isInPerson) && !v.host) {
    mark('m-host', true);
    if (!get('m-error').textContent)
      get('m-error').textContent = 'Host is required for Instructor Led / In person events.';
  } else {
    mark('m-host', false);
  }

  
  if (isWbt) {
    if (!v.wbtLink && !v.ievolveId) {
      mark('m-wbtLink', true);
      mark('m-ievolveId', true);
      if (!get('m-error').textContent)
        get('m-error').textContent = 'Provide WBT Link OR iEvolve ID.';
    } else {
      mark('m-wbtLink', false);
      mark('m-ievolveId', false);
    }
  }

  if (!valid) return;

  
  get('m-save-btn').disabled = true;
  setSaveStatus('saving', 'saving…');

  const payload = {
    stream:          v.stream,
    programType:     v.programType,
    title:           v.title,
    form:            v.form,
    date:            v.date,
    from:            v.from,
    durationMinutes: durationMin,
    host:            (isInstructor || isInPerson) ? v.host : '',
    wbtLink:         isWbt ? v.wbtLink : '',
    ievolveId:       isWbt ? v.ievolveId : '',
    note:            v.note
  };

  Debug.log('[ADD_EVENT][SUBMIT]', payload);

  google.script.run
    .withSuccessHandler(res => {
      Debug.log('[ADD_EVENT][SUCCESS]', res);

      setSaveStatus('saved', 'all saved');
      closeAddModal();

      
      const newEv = {
        id: String(res.id),
        date: payload.date,
        week: getProgramWeekJs(payload.date),   
        from: payload.from,
        duration: durationMin,
        baseDuration: durationMin,
        durationMultiplier: isWbt ? WBT_DURATION_MULTIPLIER : 1,
        streams: [payload.stream],
        streamRaw: payload.stream,
        title: payload.title,
        programType: payload.programType,
        form: payload.form,
        formClass: normalizeFormClassFromSheetValue(payload.form),
        typeClass: getTypeClassFromProgramType(payload.programType),
        host: payload.host,
        wbtLink: payload.wbtLink,
        ievolveId: payload.ievolveId,
        note: payload.note,
        meetingId: '',
        passcode: ''
      };

      RAW_EVENTS.push(newEv);
      refreshCalendarView();  
    })
    .withFailureHandler(err => {
      Debug.error('[ADD_EVENT][FAILURE]', err);
      get('m-save-btn').disabled = false;
      setSaveStatus('error', 'save failed');
      get('m-error').textContent =
        'Save failed: ' + (err && err.message ? err.message : err);
    })
    .createEvent(payload);
}

function exportCSV() {
  
  const HEADERS = [
    'event ID', 'Stream', 'Date', 'From', 'Duration',
    'Title', 'Program type', 'Form', 'Host',
    'WBT link', 'iEvolve ID', 'Meeting ID', 'Meeting Passcode', 'Note'
  ];

  
 const filtered = RAW_EVENTS.filter(ev => {
    if (!ev) return false;

    const streams = ev.streams && ev.streams.length
      ? ev.streams
      : [ev.stream || ev.streamRaw || ''];

    const streamOK =
      activeStream === 'ALL' ||
      streams.includes(activeStream) ||
      streams.includes('Common');

    const typeOK =
      activeType === 'ALL' ||
      ev.typeClass === activeType;

    const formOK =
      activeForm === 'ALL' ||
      ev.formClass === activeForm ||
      ev.form === activeForm;

    const hostOK =
      activeHost === 'ALL' ||
      (ev.formClass !== 'form-wbt' &&
       (ev.host || '').trim() === activeHost);

    return streamOK && typeOK && formOK && hostOK;
  });

  if (!filtered.length) {
    showToast('No events to export with the current filters.');
    return;
  }

  
  function minsToHHMM(mins) {
    const m = parseInt(mins || 0);
    const h = Math.floor(m / 60);
    const mm = m % 60;
    return h + ':' + String(mm).padStart(2, '0');
  }

  
  function csvCell(val) {
    const s = String(val == null ? '' : val);
    if (s.includes(',') || s.includes('"') || s.includes('\n') || s.includes('\r')) {
      return '"' + s.replace(/"/g, '""') + '"';
    }
    return s;
  }

  function csvRow(cells) {
    return cells.map(csvCell).join(',');
  }

  
  const rows = [csvRow(HEADERS)];

  
  const sorted = filtered.slice().sort((a, b) => {
    const dateCmp = String(a.date || '').localeCompare(String(b.date || ''));
    if (dateCmp !== 0) return dateCmp;
    return String(a.from || '').localeCompare(String(b.from || ''));
  });

  sorted.forEach(ev => {
    const streamVal = ev.streamRaw ||
      (ev.streams && ev.streams.length ? ev.streams.join(', ') : (ev.stream || ''));

    
    const durMins = ev.baseDuration !== undefined
      ? ev.baseDuration
      : ev.duration;

    rows.push(csvRow([
      ev.id          || '',
      streamVal,
      ev.date        || '',
      ev.from        || '',
      minsToHHMM(durMins),
      ev.title       || '',
      ev.programType || '',
      ev.form        || '',
      ev.host        || '',
      ev.wbtLink     || '',
      ev.ievolveId   || '',
      ev.meetingId   || '',
      ev.passcode    || '',
      ev.note        || ''
    ]));
  });

  const csvContent = rows.join('\r\n');

  
  const parts = ['ITDI2026'];
  if (activeStream !== 'ALL') parts.push(activeStream);
  if (activeType   !== 'ALL') parts.push(activeType);
  if (activeForm   !== 'ALL') parts.push(activeForm.replace('form-', ''));
  parts.push(new Date().toISOString().slice(0, 10));
  const filename = parts.join('_') + '.csv';

  
  const BOM = '\uFEFF';
  const blob = new Blob([BOM + csvContent], { type: 'text/csv;charset=utf-8;' });
  const url  = URL.createObjectURL(blob);
  const link = document.createElement('a');
  link.href     = link.download = filename;
  link.href     = url;
  link.download = filename;
  link.style.display = 'none';
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
  setTimeout(() => URL.revokeObjectURL(url), 5000);

  Debug.log('[CSV][EXPORT] rows=' + (rows.length - 1) + ' file=' + filename);
  showToast('Exported ' + (rows.length - 1) + ' events → ' + filename);
}

function renderAgendaModal(res) {
  const subtitle = document.getElementById('agendaModalSubtitle');
  const body = document.getElementById('agendaModalBody');

  if (!subtitle || !body) return;

  const values = res && res.values ? res.values : [];
  subtitle.textContent = res && res.sheetName ? res.sheetName : '';

  if (!values.length) {
    body.innerHTML = '<div class="agenda-empty">No agenda table found for this event.</div>';
    return;
  }

  let caption = '';
  let rows = values;

  if (values.length > 1) {
    const firstRowFilled = values[0].filter(v => String(v || '').trim() !== '');
    if (firstRowFilled.length === 1) {
      caption = String(firstRowFilled[0] || '').trim();
      rows = values.slice(1);
    }
  }

  if (!rows.length) {
    body.innerHTML = '<div class="agenda-empty">No agenda table found for this event.</div>';
    return;
  }

  const html = renderAgendaTable(rows, caption);
  body.innerHTML = html;
}

function renderAgendaTable(rows, caption) {
  const header = rows[0] || [];
  const bodyRows = rows.slice(1);

  let html = '';

  if (caption) {
    html += '<div class="agenda-caption">' + esc(caption) + '</div>';
  }

  html += '<table class="agenda-table">';

  html += '<thead><tr>';
  header.forEach(cell => {
    html += '<th>' + esc(cell) + '</th>';
  });
  html += '</tr></thead>';

  html += '<tbody>';
  bodyRows.forEach(row => {
    html += '<tr>';
    row.forEach(cell => {
      html += '<td>' + esc(cell) + '</td>';
    });
    html += '</tr>';
  });
  html += '</tbody>';

  html += '</table>';

  return html;
}

function closeAgendaModal() {
  const modal = document.getElementById('agendaModal');
  if (modal) modal.classList.remove('open');
}

function onAgendaOverlayClick(e) {
  if (e.target && e.target.id === 'agendaModal') {
    closeAgendaModal();
  }
}
